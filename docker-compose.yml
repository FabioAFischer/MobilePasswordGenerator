services:
  db:
    image: postgres:16
    container_name: passwordgenerator-db
    restart: always
    environment:
      POSTGRES_DB: passwordgenerator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: passwordgenerator-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/passwordgenerator
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: super-secret-key-123456789
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"

  mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passwordgenerator-mobile
    restart: always
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:8080
    ports:
      - "3000:3000"

volumes:
  pgdata: