version: "3.9"

services:
  db:
    image: postgres:16
    container_name: passwordgenerator-db
    restart: always
    environment:
      POSTGRES_DB: passwordgenerator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d passwordgenerator"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: passwordgenerator-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/passwordgenerator
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      JWT_SECRET: 7f4c9a1e2b8d3f6a9c0e5d1b7a2f4c8e9d6b1a3f5c7e8d2a
      JWT_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS --connect-timeout 3 http://localhost:8080/api > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mobile:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: passwordgenerator-mobile
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      EXPO_NO_TELEMETRY: "1"
      BROWSER: "none"
      EXPO_PUBLIC_API_URL: http://10.0.2.2:8080/api
      REACT_NATIVE_PACKAGER_HOSTNAME: 10.0.2.2
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    stdin_open: true
    tty: true
volumes:
    pgdata: